<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1040" width="100%" height="100%" style="background-color: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow-request" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#5A86C8"/></marker>
    <marker id="arrow-tool" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#D6A05E"/></marker>
    <marker id="arrow-awaiting" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#BE8E73"/></marker>
    <style>
      .lifeline { stroke: #E5E7EB; stroke-width: 2; stroke-dasharray: 4 4; }
      .entity { fill: #FFFFFF; stroke: #374151; stroke-width: 2; rx: 6; }
      .entity-text { fill: #374151; font-size: 14px; font-weight: 700; text-anchor: middle; }
      .stage { fill: #8A8175; font-size: 12px; font-weight: 700; text-anchor: middle; letter-spacing: 1px; }
      .label { font-size: 13px; font-weight: 700; text-anchor: middle; }
      .code { fill: #6B7280; font-size: 12px; font-family: monospace; text-anchor: middle; }
      .request { stroke: #5A86C8; fill: none; stroke-width: 2; }
      .tool { stroke: #D6A05E; fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
      .awaiting { stroke: #BE8E73; fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
      .label-request { fill: #5A86C8; }
      .label-tool { fill: #D6A05E; }
      .label-awaiting { fill: #BE8E73; }
    </style>
  </defs>

  <line class="lifeline" x1="110" y1="80" x2="110" y2="1000" />
  <line class="lifeline" x1="700" y1="80" x2="700" y2="1000" />
  <line class="lifeline" x1="1290" y1="80" x2="1290" y2="1000" />
  <rect class="entity" x="30" y="40" width="160" height="40" /><text class="entity-text" x="110" y="65">Frontend</text>
  <rect class="entity" x="620" y="40" width="160" height="40" /><text class="entity-text" x="700" y="65">Agent Platform</text>
  <rect class="entity" x="1210" y="40" width="160" height="40" /><text class="entity-text" x="1290" y="65">Run-Agent</text>
  <text class="stage" x="700" y="110">QUESTION</text>

  <g opacity="0"><animate attributeName="opacity" begin="0s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="tool" d="M1290 160 L110 160" marker-end="url(#arrow-tool)"/><text class="label label-tool" x="700" y="152">[SSE] tool.start (工具开始，触发 question 流程)</text><text class="code" x="700" y="176">data: {"type":"tool.start","toolId":"tool_q_001","runId":"mnzmv40q","toolName":"collect_missing_info"}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="0.8s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="awaiting" d="M1290 250 L110 250" marker-end="url(#arrow-awaiting)"/><text class="label label-awaiting" x="700" y="242">[SSE] awaiting.ask (进入等待态，还没有 questions payload)</text><text class="code" x="700" y="266">data: {"type":"awaiting.ask","toolId":"tool_q_001","awaitingId":"await_001","kind":"question","viewportKey":"question_form"}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="1.6s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="tool" d="M1290 340 L110 340" marker-end="url(#arrow-tool)"/><text class="label label-tool" x="700" y="332">[SSE] tool.args (工具参数继续流出)</text><text class="code" x="700" y="356">data: {"type":"tool.args","toolId":"tool_q_001","delta":"{\"topic\":\"AGW protocol\"}"}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="2.4s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="tool" d="M1290 430 L110 430" marker-end="url(#arrow-tool)"/><text class="label label-tool" x="700" y="422">[SSE] tool.end (工具参数结束)</text><text class="code" x="700" y="446">data: {"type":"tool.end","toolId":"tool_q_001"}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="3.2s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="awaiting" d="M1290 520 L110 520" marker-end="url(#arrow-awaiting)"/><text class="label label-awaiting" x="700" y="512">[SSE] awaiting.payload (问题列表在这里下发)</text><text class="code" x="700" y="536">data: {"type":"awaiting.payload","toolId":"tool_q_001","questions":[{"id":"q1","label":"目标读者是谁？"},{"id":"q2","label":"更偏实现还是更偏架构？"}]}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="4.0s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="request" d="M110 610 L700 610" marker-end="url(#arrow-request)"/><text class="label label-request" x="405" y="602">POST /api/submit (提交交互结果)</text><text class="code" x="405" y="626">{"awaitingId":"await_001","answers":{"q1":"前端工程师","q2":"偏实现"}}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="4.8s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="request" d="M700 700 L110 700" marker-end="url(#arrow-request)"/><text class="label label-request" x="405" y="692">HTTP ack (提交成功接收)</text><text class="code" x="405" y="716">{"accepted":true,"status":"accepted","awaitingId":"await_001"}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="5.6s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="request" d="M700 790 L1290 790" marker-end="url(#arrow-request)" stroke-dasharray="6 4"/><text class="label label-request" x="995" y="782">[SSE] request.submit (提交结果回到运行侧)</text><text class="code" x="995" y="806">data: {"type":"request.submit","toolId":"tool_q_001","answers":{"q1":"前端工程师","q2":"偏实现"}}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="6.4s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="tool" d="M1290 880 L110 880" marker-end="url(#arrow-tool)"/><text class="label label-tool" x="700" y="872">[SSE] tool.result (question 分支恢复主流)</text><text class="code" x="700" y="896">data: {"type":"tool.result","toolId":"tool_q_001","result":"{\"ok\":true,\"status\":\"answered\"}"}</text></g>
</svg>
