<svg width="1360" height="778" viewBox="0 0 1360 778" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">02 AGW Basic + Steer + Interrupt</title>
  <desc id="desc">基础 Query 主流和两个运行中控制分支合并在同一张图里。</desc>

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L10,5 L0,10 z" fill="#29434e" />
  </marker>
  <style>
    .bg { fill: #fbfaf7; }
    .lane { stroke: #93a6ad; stroke-width: 2; }
    .node { stroke-width: 2; rx: 14; ry: 14; }
    .front { fill: #d9eefb; stroke: #19607e; }
    .platform { fill: #e8f4e8; stroke: #2e7d32; }
    .run { fill: #fff3d6; stroke: #a36f00; }
    .note { fill: #f4e6dc; stroke: #8f5f3d; }
    .accent { fill: #ede7fb; stroke: #6a4fb3; }
    .title { font: 700 28px "Helvetica Neue", Arial, sans-serif; fill: #1f2a30; }
    .subtitle { font: 600 18px "Helvetica Neue", Arial, sans-serif; fill: #1f2a30; }
    .text { font: 500 15px "Helvetica Neue", Arial, sans-serif; fill: #24343b; }
    .small { font: 500 13px "Helvetica Neue", Arial, sans-serif; fill: #485e67; }
    .tiny { font: 500 12px "Helvetica Neue", Arial, sans-serif; fill: #566c74; }
    .arrow { stroke: #29434e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .dashed { stroke-dasharray: 8 6; }
    .panel { fill: #ffffff; stroke: #c7d3d8; stroke-width: 1.5; rx: 16; ry: 16; }
  </style>
</defs>
  <rect class="bg" x="0" y="0" width="1360" height="778" />
  <text class="title" x="52" y="58">02 AGW Basic + Steer + Interrupt</text>
  <text class="small" x="52" y="88">basic、steer、interrupt 都共享同一条 live SSE；steer 插入 request.steer，interrupt 以 run.cancel 收尾。</text>
  <text class="subtitle" x="98" y="145">Frontend</text>
  <text class="subtitle" x="432" y="145">Agent Platform</text>
  <text class="subtitle" x="848" y="145">Run-Agent</text>
  <line class="lane" x1="170" y1="170" x2="170" y2="620" />
  <line class="lane" x1="540" y1="170" x2="540" y2="620" />
  <line class="lane" x1="960" y1="170" x2="960" y2="620" />
  <rect class="node front" x="48" y="188" width="244" height="52" />
  <text class="text" x="82" y="220">POST /api/query</text>
  <rect class="node platform" x="414" y="188" width="252" height="52" />
  <text class="text" x="444" y="220">HTTP 200 + text/event-stream</text>
  <path class="arrow" d="M292 214 H406" />
  <rect class="node run" x="824" y="188" width="272" height="52" />
  <text class="text" x="852" y="220">request.query</text>
  <path class="arrow dashed" d="M824 214 H548" />
  <path class="arrow dashed" d="M540 214 H178" />
  <rect class="node run" x="824" y="260" width="272" height="52" />
  <text class="text" x="852" y="292">chat.start (optional)</text>
  <path class="arrow dashed" d="M824 286 H548" />
  <path class="arrow dashed" d="M540 286 H178" />
  <rect class="node run" x="824" y="332" width="272" height="52" />
  <text class="text" x="852" y="364">run.start</text>
  <path class="arrow dashed" d="M824 358 H548" />
  <path class="arrow dashed" d="M540 358 H178" />
  <rect class="node accent" x="796" y="418" width="328" height="74" />
  <text class="text" x="826" y="448">reasoning.* / content.* / tool.* / action.*</text>
  <text class="small" x="826" y="472">基础主流持续输出；正常结束为 run.complete</text>
  <path class="arrow dashed" d="M796 454 H548" />
  <path class="arrow dashed" d="M540 454 H178" />
  <rect class="node note" x="44" y="520" width="248" height="48" />
  <text class="text" x="74" y="550">POST /api/steer -&gt; HTTP ack</text>
  <path class="arrow" d="M292 544 H406" />
  <rect class="node run" x="816" y="520" width="288" height="48" />
  <text class="text" x="844" y="550">request.steer -&gt; 原流继续</text>
  <path class="arrow" d="M666 544 H808" />
  <rect class="node note" x="36" y="586" width="256" height="48" />
  <text class="text" x="64" y="616">POST /api/interrupt -&gt; HTTP ack</text>
  <path class="arrow" d="M292 610 H406" />
  <rect class="node run" x="812" y="586" width="296" height="48" />
  <text class="text" x="836" y="616">run.cancel -&gt; [DONE]</text>
  <path class="arrow" d="M666 610 H804" />
  <rect class="panel" x="56" y="640" width="1248" height="118" />
  <text class="subtitle" x="80" y="670">图上要点</text>
  <text class="small" x="80" y="698">- request.steer 只出现在原 SSE 流中，不会新开第二条事件流。</text>
  <text class="small" x="80" y="720">- 不存在 request.interrupt；interrupt 的流内结果是 run.cancel。</text>
  <text class="small" x="80" y="742">- run.cancel 与 run.complete 互斥，run.cancel 后紧接 [DONE]。</text>
</svg>
