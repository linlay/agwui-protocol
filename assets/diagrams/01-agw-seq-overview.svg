<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" width="100%" height="100%" role="img" aria-labelledby="title desc" style="background-color: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <title id="title">01 AGW Sequence Overview</title>
  <desc id="desc">AGW live protocol overview in sequence-diagram style, showing query entry, main SSE flow, and in-run control branches.</desc>

  <defs>
    <marker id="arrow-request" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A86C8"/>
    </marker>
    <marker id="arrow-chat" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#6B92BF"/>
    </marker>
    <marker id="arrow-run" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#4476AD"/>
    </marker>
    <marker id="arrow-content" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#7AB9A8"/>
    </marker>
    <style>
      .lifeline { stroke: #E5E7EB; stroke-width: 2; stroke-dasharray: 4 4; }
      .entity { fill: #FFFFFF; stroke: #374151; stroke-width: 2; rx: 6; }
      .entity-text { fill: #374151; font-size: 14px; font-weight: 700; text-anchor: middle; }
      .stage { fill: #9CA3AF; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-anchor: middle; }
      .note { fill: #9CA3AF; font-size: 11px; font-weight: 500; text-anchor: middle; }
      .label { font-size: 13px; font-weight: 700; text-anchor: middle; }
      .code { fill: #6B7280; font-size: 12px; font-family: monospace; text-anchor: middle; }
      .request { stroke: #5A86C8; fill: none; stroke-width: 2; }
      .chat { stroke: #6B92BF; fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
      .run { stroke: #4476AD; fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
      .content { stroke: #7AB9A8; fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
      .label-request { fill: #5A86C8; }
      .label-chat { fill: #6B92BF; }
      .label-run { fill: #4476AD; }
      .label-content { fill: #7AB9A8; }
    </style>
  </defs>

  <line class="lifeline" x1="100" y1="80" x2="100" y2="970" />
  <line class="lifeline" x1="1100" y1="80" x2="1100" y2="970" />

  <rect class="entity" x="20" y="40" width="160" height="40" />
  <text class="entity-text" x="100" y="65">Frontend</text>
  <rect class="entity" x="1020" y="40" width="160" height="40" />
  <text class="entity-text" x="1100" y="65">Agent Platform</text>

  <text class="stage" x="600" y="100">QUERY ENTRY</text>

  <g>
    <path class="request" d="M100 150 L1100 150" marker-end="url(#arrow-request)"/>
    <text class="label label-request" x="600" y="142">POST /api/query</text>
    <text class="code" x="600" y="166">{"agentKey":"ak","message":"概括 AGW live 协议的主链路与控制分支"}</text>
  </g>

  <g>
    <path class="request" d="M1100 225 L100 225" marker-end="url(#arrow-request)"/>
    <text class="label label-request" x="600" y="217">HTTP 200 OK</text>
    <text class="code" x="600" y="241">Content-Type: text/event-stream</text>
  </g>

  <g>
    <path class="chat" d="M1100 300 L100 300" marker-end="url(#arrow-chat)"/>
    <text class="label label-chat" x="600" y="292">[SSE] chat.start</text>
    <text class="code" x="600" y="316">data: {"type":"chat.start","chatId":"uuid","chatName":"Overview Session"}</text>
  </g>

  <g>
    <path class="run" d="M1100 375 L100 375" marker-end="url(#arrow-run)"/>
    <text class="label label-run" x="600" y="367">[SSE] run.start</text>
    <text class="code" x="600" y="391">data: {"type":"run.start","runId":"ordered_id","chatId":"uuid","agentKey":"ak"}</text>
  </g>

  <text class="stage" x="600" y="460">MAIN LIVE FLOW</text>
  <text class="note" x="600" y="480">协议默认主体只有 Frontend 与 Agent Platform，所有前端可见 live 事件都沿同一条 SSE 流回传。</text>

  <g>
    <path class="content" d="M1100 535 L100 535" marker-end="url(#arrow-content)"/>
    <text class="label label-content" x="600" y="527">[SSE] reasoning.* / content.* / tool.* / action.* / artifact.publish</text>
    <text class="code" x="600" y="551">原始执行过程持续在流内展开，前端按事件类型增量消费与渲染。</text>
  </g>

  <g>
    <path class="run" d="M1100 610 L100 610" marker-end="url(#arrow-run)"/>
    <text class="label label-run" x="600" y="602">[SSE] run.complete / run.failed / run.cancel</text>
    <text class="code" x="600" y="626">一次运行的结束结果也在同一条流里表达；图中不单独展开传输层 [DONE] 收尾。</text>
  </g>

  <text class="stage" x="600" y="700">IN-RUN CONTROLS</text>
  <text class="note" x="600" y="720">运行过程中，前端可以继续发起控制请求；HTTP 先确认接收，后续结果再折返到原始 SSE 流中体现。</text>

  <g>
    <path class="request" d="M100 785 L1100 785" marker-end="url(#arrow-request)"/>
    <text class="label label-request" x="600" y="777">POST /api/submit</text>
    <text class="code" x="600" y="801">HTTP ack -&gt; [SSE] request.submit，恢复等待中的工具交互，后续结果继续走原流。</text>
  </g>

  <g>
    <path class="request" d="M100 860 L1100 860" marker-end="url(#arrow-request)"/>
    <text class="label label-request" x="600" y="852">POST /api/steer</text>
    <text class="code" x="600" y="876">HTTP ack -&gt; [SSE] request.steer，在原始事件流中插入追加用户指令，再继续输出。</text>
  </g>

  <g>
    <path class="request" d="M100 935 L1100 935" marker-end="url(#arrow-request)"/>
    <text class="label label-request" x="600" y="927">POST /api/interrupt</text>
    <text class="code" x="600" y="951">HTTP ack -&gt; [SSE] run.cancel，直接在原始 SSE 流中表达当前运行的中断结果。</text>
  </g>
</svg>
