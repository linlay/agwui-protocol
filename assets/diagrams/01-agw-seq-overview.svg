<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 940" width="100%" height="100%" role="img" aria-labelledby="title desc" style="background-color: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <title id="title">01 AGW Sequence Overview</title>
  <desc id="desc">AGW live protocol overview diagram showing the query entry, the main live SSE flow, and in-run control branches.</desc>

  <defs>
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#9CA3AF"/>
    </marker>
    <marker id="arrow-request" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A86C8"/>
    </marker>
    <style>
      .section { fill: #9CA3AF; font-size: 12px; font-weight: 700; letter-spacing: 1.4px; }
      .panel { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1.5; rx: 18; }
      .entity { fill: #FFFFFF; stroke: #374151; stroke-width: 2; rx: 6; }
      .entity-text { fill: #374151; font-size: 14px; font-weight: 700; text-anchor: middle; }
      .lane { stroke: #E5E7EB; stroke-width: 2; stroke-dasharray: 4 4; }
      .card { fill: #FFFFFF; stroke-width: 2; rx: 14; }
      .card-title { fill: #374151; font-size: 18px; font-weight: 700; }
      .card-body { fill: #6B7280; font-size: 13px; font-weight: 500; }
      .mono { fill: #6B7280; font-size: 12px; font-family: monospace; }
      .chip-text { fill: #374151; font-size: 12px; font-weight: 700; text-anchor: middle; }
      .chip-text-artifact { fill: #C090A8; font-size: 12px; font-weight: 700; text-anchor: middle; }
      .connector { fill: none; stroke: #9CA3AF; stroke-width: 2.5; marker-end: url(#arrow-neutral); }
      .connector-request { fill: none; stroke: #5A86C8; stroke-width: 2.5; marker-end: url(#arrow-request); }
      .connector-dashed { stroke-dasharray: 7 5; }
    </style>
  </defs>

  <rect class="panel" x="54" y="44" width="1212" height="846" />

  <rect class="entity" x="96" y="72" width="180" height="44" />
  <text class="entity-text" x="186" y="99">Frontend</text>
  <rect class="entity" x="1044" y="72" width="180" height="44" />
  <text class="entity-text" x="1134" y="99">Agent Platform</text>

  <line class="lane" x1="186" y1="126" x2="186" y2="866" />
  <line class="lane" x1="1134" y1="126" x2="1134" y2="866" />

  <text class="section" x="96" y="166">QUERY ENTRY</text>
  <text class="section" x="462" y="166">LIVE FLOW OVERVIEW</text>

  <rect class="card" x="82" y="188" width="270" height="100" stroke="#5A86C8" />
  <rect x="82" y="188" width="270" height="10" rx="14" fill="#5A86C8" />
  <text class="card-title" x="110" y="230">POST /api/query</text>
  <text class="card-body" x="110" y="256">Frontend 用一次 HTTP 请求进入协议。</text>
  <text class="mono" x="110" y="276">message / agentKey / chatId(optional)</text>

  <path class="connector-request" d="M352 238 H404" />

  <rect class="card" x="420" y="188" width="314" height="100" stroke="#5A86C8" />
  <rect x="420" y="188" width="314" height="10" rx="14" fill="#5A86C8" />
  <text class="card-title" x="448" y="230">HTTP 200 + SSE</text>
  <text class="card-body" x="448" y="256">平台确认接收请求，并切到 live SSE 回传。</text>
  <text class="mono" x="448" y="276">Content-Type: text/event-stream</text>

  <path class="connector" d="M734 238 H776" />

  <rect class="card" x="792" y="166" width="398" height="234" stroke="#4476AD" />
  <rect x="792" y="166" width="398" height="10" rx="14" fill="#4476AD" />
  <text class="card-title" x="820" y="208">主链路在同一条 SSE 流中持续展开</text>
  <text class="card-body" x="820" y="234">先建立 chat / run 上下文，再持续输出前端可见的 live 事件。</text>

  <rect class="card" x="820" y="254" width="110" height="34" stroke="#6B92BF" />
  <text class="chip-text" x="875" y="276">chat.start</text>

  <rect class="card" x="944" y="254" width="106" height="34" stroke="#4476AD" />
  <text class="chip-text" x="997" y="276">run.start</text>

  <rect class="card" x="1064" y="254" width="98" height="34" stroke="#4476AD" />
  <text class="chip-text" x="1113" y="276">run.end</text>

  <rect class="card" x="820" y="300" width="150" height="34" stroke="#7AB9A8" />
  <text class="chip-text" x="895" y="322">reasoning.*</text>

  <rect class="card" x="984" y="300" width="138" height="34" stroke="#7AB9A8" />
  <text class="chip-text" x="1053" y="322">content.*</text>

  <rect class="card" x="820" y="346" width="106" height="34" stroke="#7AB9A8" />
  <text class="chip-text" x="873" y="368">tool.*</text>

  <rect class="card" x="940" y="346" width="120" height="34" stroke="#7AB9A8" />
  <text class="chip-text" x="1000" y="368">action.*</text>

  <rect class="card" x="1074" y="346" width="88" height="34" stroke="#C090A8" />
  <text class="chip-text-artifact" x="1118" y="368">artifact</text>

  <rect class="card" x="82" y="430" width="1108" height="118" stroke="#E5E7EB" />
  <text class="section" x="106" y="456">MAIN IDEA</text>
  <text class="card-title" x="106" y="488">协议默认主体只有 Frontend 与 Agent Platform</text>
  <text class="card-body" x="106" y="512">Gateway 只是兼容部署模式之一；总览图只画前端可见的 request 与 live SSE 协议面。</text>
  <text class="card-body" x="106" y="534">主执行过程、问题分支、审批分支和 <tspan fill="#C090A8" font-weight="700">artifact</tspan> 发布，都共享这条原始 SSE 流，不额外分叉出另一套前端协议。</text>

  <text class="section" x="96" y="598">IN-RUN CONTROLS</text>

  <rect class="card" x="82" y="620" width="1108" height="246" stroke="#E5E7EB" />

  <rect class="card" x="112" y="650" width="224" height="42" stroke="#5A86C8" />
  <text class="chip-text" x="224" y="676">POST /api/submit</text>
  <path class="connector-request" d="M336 671 H400" />
  <rect class="card" x="418" y="640" width="732" height="62" stroke="#6B92BF" />
  <text class="card-title" x="446" y="668">request.submit</text>
  <text class="card-body" x="446" y="688">恢复等待中的工具交互；后续结果继续沿同一条 SSE 流输出。</text>

  <rect class="card" x="112" y="722" width="224" height="42" stroke="#5A86C8" />
  <text class="chip-text" x="224" y="748">POST /api/steer</text>
  <path class="connector-request connector-dashed" d="M336 743 H400" />
  <rect class="card" x="418" y="712" width="732" height="62" stroke="#4476AD" />
  <text class="card-title" x="446" y="740">request.steer</text>
  <text class="card-body" x="446" y="760">把追加用户指令插回原始事件流，再继续生成后续内容。</text>

  <rect class="card" x="112" y="794" width="224" height="42" stroke="#5A86C8" />
  <text class="chip-text" x="224" y="820">POST /api/interrupt</text>
  <path class="connector-request" d="M336 815 H400" />
  <rect class="card" x="418" y="784" width="732" height="62" stroke="#4476AD" />
  <text class="card-title" x="446" y="812">run.cancel</text>
  <text class="card-body" x="446" y="832">中断结果直接在 SSE 流里体现；总览图不单独展开传输层 [DONE] 收尾。</text>
</svg>
