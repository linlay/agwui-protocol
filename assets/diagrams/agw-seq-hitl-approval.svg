<svg width="1360" height="1090" viewBox="0 0 1360 1090" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AGW HITL Approval Sequence</title>
  <desc id="desc">Approval 模式：awaiting.ask 自带 questions，用户确认后通过 submit 恢复运行。</desc>

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L10,5 L0,10 z" fill="#29434e" />
  </marker>
  <style>
    .bg { fill: #fbfaf7; }
    .lane { stroke: #93a6ad; stroke-width: 2; }
    .node { stroke-width: 2; rx: 14; ry: 14; }
    .front { fill: #d9eefb; stroke: #19607e; }
    .gate { fill: #e8f4e8; stroke: #2e7d32; }
    .run { fill: #fff3d6; stroke: #a36f00; }
    .note { fill: #f4e6dc; stroke: #8f5f3d; }
    .accent { fill: #ede7fb; stroke: #6a4fb3; }
    .title { font: 700 28px "Helvetica Neue", Arial, sans-serif; fill: #1f2a30; }
    .subtitle { font: 600 18px "Helvetica Neue", Arial, sans-serif; fill: #1f2a30; }
    .text { font: 500 15px "Helvetica Neue", Arial, sans-serif; fill: #24343b; }
    .small { font: 500 13px "Helvetica Neue", Arial, sans-serif; fill: #485e67; }
    .tiny { font: 500 12px "Helvetica Neue", Arial, sans-serif; fill: #566c74; }
    .arrow { stroke: #29434e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .dashed { stroke-dasharray: 8 6; }
    .panel { fill: #ffffff; stroke: #c7d3d8; stroke-width: 1.5; rx: 16; ry: 16; }
  </style>
</defs>
  <rect class="bg" x="0" y="0" width="1360" height="1090" />
  <text class="title" x="52" y="58">AGW HITL Approval Sequence</text>
  <text class="small" x="52" y="88">Approval 模式：awaiting.ask 自带 questions，用户确认后通过 submit 恢复运行。</text>
  <text class="subtitle" x="115" y="145">Frontend</text>
  <line class="lane" x1="170" y1="168" x2="170" y2="700" />
  <text class="subtitle" x="485" y="145">Gateway</text>
  <line class="lane" x1="540" y1="168" x2="540" y2="700" />
  <text class="subtitle" x="905" y="145">Run-Agent</text>
  <line class="lane" x1="960" y1="168" x2="960" y2="700" />
  <rect class="node front" x="60" y="166" width="220" height="48" />
  <text class="text" x="78" y="196">POST /api/query</text>
  <path class="arrow" d="M280 190 H422" />
  <rect class="node run" x="830" y="238" width="260" height="52" />
  <text class="text" x="848" y="268">tool.start</text>
  <path class="arrow dashed" d="M830 264 H548" />
  <path class="arrow dashed" d="M540 264 H178" />
  <rect class="node run" x="830" y="312" width="260" height="52" />
  <text class="text" x="848" y="342">tool.args</text>
  <path class="arrow dashed" d="M830 338 H548" />
  <path class="arrow dashed" d="M540 338 H178" />
  <rect class="node run" x="830" y="386" width="260" height="52" />
  <text class="text" x="848" y="416">tool.end</text>
  <path class="arrow dashed" d="M830 412 H548" />
  <path class="arrow dashed" d="M540 412 H178" />
  <rect class="node run" x="830" y="460" width="260" height="52" />
  <text class="text" x="848" y="490">awaiting.ask + top-level questions</text>
  <path class="arrow dashed" d="M830 486 H548" />
  <path class="arrow dashed" d="M540 486 H178" />
  <rect class="node front" x="60" y="536" width="220" height="48" />
  <text class="text" x="78" y="566">POST /api/submit (awaitingId)</text>
  <path class="arrow" d="M280 560 H422" />
  <rect class="node gate" x="430" y="610" width="220" height="48" />
  <text class="text" x="448" y="640">HTTP ack (accepted)</text>
  <path class="arrow" d="M430 634 H288" />
  <rect class="node run" x="830" y="682" width="260" height="52" />
  <text class="text" x="848" y="712">request.submit</text>
  <path class="arrow dashed" d="M830 708 H548" />
  <path class="arrow dashed" d="M540 708 H178" />
  <rect class="node run" x="830" y="756" width="260" height="52" />
  <text class="text" x="848" y="786">tool.result</text>
  <path class="arrow dashed" d="M830 782 H548" />
  <path class="arrow dashed" d="M540 782 H178" />
  <rect class="node accent" x="810" y="824" width="300" height="64" />
  <text class="text" x="828" y="852">Run resumes</text>
  <text class="small" x="828" y="874">继续输出 content.* 并最终 run.complete</text>
  <path class="arrow dashed" d="M810 856 H548" />
  <path class="arrow dashed" d="M540 856 H178" />
  <rect class="panel" x="54" y="940" width="1252" height="130" />
  <text class="subtitle" x="78" y="970">图上要点</text>
  <text class="small" x="78" y="998">- approval 模式没有 awaiting.payload。</text>
  <text class="small" x="78" y="1020">- awaiting.ask.awaitingId 与 tool.start.toolId 相同。</text>
  <text class="small" x="78" y="1042">- HTTP 字段名是 awaitingId；当前 live SSE 的 request.submit 仍使用 toolId。</text>
</svg>
