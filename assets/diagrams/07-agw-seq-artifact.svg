<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%" style="background-color: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow-tool" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#D6A05E"/></marker>
    <marker id="arrow-artifact" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#D5A774"/></marker>
    <style>
      .lifeline { stroke: #E5E7EB; stroke-width: 2; stroke-dasharray: 4 4; }
      .entity { fill: #FFFFFF; stroke: #374151; stroke-width: 2; rx: 6; }
      .entity-text { fill: #374151; font-size: 14px; font-weight: 700; text-anchor: middle; }
      .label { font-size: 13px; font-weight: 700; text-anchor: middle; }
      .code { fill: #6B7280; font-size: 12px; font-family: monospace; text-anchor: middle; }
      .tool { stroke: #D6A05E; fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
      .artifact { stroke: #D5A774; fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
      .label-tool { fill: #D6A05E; }
      .label-artifact { fill: #D5A774; }
    </style>
  </defs>

  <line class="lifeline" x1="100" y1="80" x2="100" y2="590" />
  <line class="lifeline" x1="1100" y1="80" x2="1100" y2="590" />
  <rect class="entity" x="20" y="40" width="160" height="40" />
  <text class="entity-text" x="100" y="65">Frontend</text>
  <rect class="entity" x="1020" y="40" width="160" height="40" />
  <text class="entity-text" x="1100" y="65">Agent Platform</text>

  <g opacity="0"><animate attributeName="opacity" begin="0s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="tool" d="M1100 160 L100 160" marker-end="url(#arrow-tool)"/><text class="label label-tool" x="600" y="152">[SSE] tool.start (工具开始，准备发布产物)</text><text class="code" x="600" y="176">data: {"type":"tool.start","toolId":"tool_publish_1","runId":"mnzmv63s","toolName":"_artifact_publish_"}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="0.8s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="tool" d="M1100 220 L100 220" marker-end="url(#arrow-tool)"/><text class="label label-tool" x="600" y="212">[SSE] tool.args (工具参数里声明多个产物)</text><text class="code" x="600" y="236">data: {"type":"tool.args","toolId":"tool_publish_1","delta":"{\"artifacts\":[{\"path\":\"/workspace/reports/final-report.md\"},{\"path\":\"/workspace/reports/summary.md\"}]}"}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="1.6s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="tool" d="M1100 280 L100 280" marker-end="url(#arrow-tool)"/><text class="label label-tool" x="600" y="272">[SSE] tool.end (工具参数结束)</text><text class="code" x="600" y="296">data: {"type":"tool.end","toolId":"tool_publish_1"}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="2.4s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="tool" d="M1100 340 L100 340" marker-end="url(#arrow-tool)"/><text class="label label-tool" x="600" y="332">[SSE] tool.result (工具结果完成后开始发布产物)</text><text class="code" x="600" y="356">data: {"type":"tool.result","toolId":"tool_publish_1","result":"{\"ok\":true,\"artifacts\":[\"asset_001\",\"asset_002\"]}"}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="3.2s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="artifact" d="M1100 400 L100 400" marker-end="url(#arrow-artifact)"/><text class="label label-artifact" x="600" y="392">[SSE] artifact.publish (发布第一个产物)</text><text class="code" x="600" y="416">data: {"type":"artifact.publish","artifactId":"asset_001","chatId":"chat_artifact_001","runId":"mnzmv63s","artifact":{"type":"file","name":"final-report.md"}}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="4.0s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="artifact" d="M1100 460 L100 460" marker-end="url(#arrow-artifact)"/><text class="label label-artifact" x="600" y="452">[SSE] artifact.publish (发布第二个产物)</text><text class="code" x="600" y="476">data: {"type":"artifact.publish","artifactId":"asset_002","chatId":"chat_artifact_001","runId":"mnzmv63s","artifact":{"type":"file","name":"summary.md"}}</text></g>
</svg>
