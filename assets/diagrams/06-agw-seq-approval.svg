<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 950" width="100%" height="100%" style="background-color: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow-request" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#5A86C8"/></marker>
    <marker id="arrow-tool" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#D6A05E"/></marker>
    <marker id="arrow-awaiting" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#BE8E73"/></marker>
    <style>
      .lifeline { stroke: #E5E7EB; stroke-width: 2; stroke-dasharray: 4 4; }
      .entity { fill: #FFFFFF; stroke: #374151; stroke-width: 2; rx: 6; }
      .entity-text { fill: #374151; font-size: 14px; font-weight: 700; text-anchor: middle; }
      .stage { fill: #8A8175; font-size: 12px; font-weight: 700; text-anchor: middle; letter-spacing: 1px; }
      .label { font-size: 13px; font-weight: 700; text-anchor: middle; }
      .code { fill: #6B7280; font-size: 12px; font-family: monospace; text-anchor: middle; }
      .request { stroke: #5A86C8; fill: none; stroke-width: 2; }
      .tool { stroke: #D6A05E; fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
      .awaiting { stroke: #BE8E73; fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
      .label-request { fill: #5A86C8; }
      .label-tool { fill: #D6A05E; }
      .label-awaiting { fill: #BE8E73; }
    </style>
  </defs>

  <line class="lifeline" x1="110" y1="80" x2="110" y2="910" />
  <line class="lifeline" x1="700" y1="80" x2="700" y2="910" />
  <line class="lifeline" x1="1290" y1="80" x2="1290" y2="910" />
  <rect class="entity" x="30" y="40" width="160" height="40" /><text class="entity-text" x="110" y="65">Frontend</text>
  <rect class="entity" x="620" y="40" width="160" height="40" /><text class="entity-text" x="700" y="65">Agent Platform</text>
  <rect class="entity" x="1210" y="40" width="160" height="40" /><text class="entity-text" x="1290" y="65">Run-Agent</text>
  <text class="stage" x="700" y="110">APPROVAL</text>

  <g opacity="0"><animate attributeName="opacity" begin="0s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="tool" d="M1290 160 L110 160" marker-end="url(#arrow-tool)"/><text class="label label-tool" x="700" y="152">[SSE] tool.start (工具开始，准备外部动作)</text><text class="code" x="700" y="176">data: {"type":"tool.start","toolId":"tool_appr_001","runId":"mnzmv52r","toolName":"external_action_request"}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="0.8s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="tool" d="M1290 250 L110 250" marker-end="url(#arrow-tool)"/><text class="label label-tool" x="700" y="242">[SSE] tool.args (工具参数继续流出)</text><text class="code" x="700" y="266">data: {"type":"tool.args","toolId":"tool_appr_001","delta":"{\"action\":\"deploy\",\"target\":\"staging\"}"}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="1.6s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="tool" d="M1290 340 L110 340" marker-end="url(#arrow-tool)"/><text class="label label-tool" x="700" y="332">[SSE] tool.end (工具参数结束)</text><text class="code" x="700" y="356">data: {"type":"tool.end","toolId":"tool_appr_001"}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="2.4s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="awaiting" d="M1290 430 L110 430" marker-end="url(#arrow-awaiting)"/><text class="label label-awaiting" x="700" y="422">[SSE] awaiting.ask (审批问题直接位于 awaiting.ask 顶层)</text><text class="code" x="700" y="446">data: {"type":"awaiting.ask","toolId":"tool_appr_001","awaitingId":"await_002","kind":"approval","questions":[{"id":"approve","label":"是否允许执行 deploy 到 staging？"}]}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="3.2s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="request" d="M110 520 L700 520" marker-end="url(#arrow-request)"/><text class="label label-request" x="405" y="512">POST /api/submit (提交审批结果)</text><text class="code" x="405" y="536">{"awaitingId":"await_002","answers":{"approve":"yes"}}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="4.0s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="request" d="M700 610 L110 610" marker-end="url(#arrow-request)"/><text class="label label-request" x="405" y="602">HTTP ack (提交成功接收)</text><text class="code" x="405" y="626">{"accepted":true,"status":"accepted","awaitingId":"await_002"}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="4.8s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="request" d="M700 700 L1290 700" marker-end="url(#arrow-request)" stroke-dasharray="6 4"/><text class="label label-request" x="995" y="692">[SSE] request.submit (审批结果回到运行侧)</text><text class="code" x="995" y="716">data: {"type":"request.submit","toolId":"tool_appr_001","answers":{"approve":"yes"}}</text></g>
  <g opacity="0"><animate attributeName="opacity" begin="5.6s" dur="0.25s" from="0" to="1" fill="freeze"/><path class="tool" d="M1290 790 L110 790" marker-end="url(#arrow-tool)"/><text class="label label-tool" x="700" y="782">[SSE] tool.result (approval 分支恢复主流)</text><text class="code" x="700" y="806">data: {"type":"tool.result","toolId":"tool_appr_001","result":"{\"ok\":true,\"approved\":true}"}</text></g>
</svg>
