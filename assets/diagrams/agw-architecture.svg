<svg width="1280" height="760" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AGW Architecture</title>
  <desc id="desc">Frontend、Gateway、Agent Router、Agents、Viewport 与 Resource Store 的关系图。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#31525b" />
    </marker>
    <style>
      .bg { fill: #f8f5ef; }
      .panel { fill: #ffffff; stroke: #31525b; stroke-width: 2; rx: 18; ry: 18; }
      .box-blue { fill: #e3f2fd; stroke: #1d5b79; stroke-width: 2; rx: 16; ry: 16; }
      .box-green { fill: #e6f4ea; stroke: #2f7d32; stroke-width: 2; rx: 16; ry: 16; }
      .box-gold { fill: #fff3cd; stroke: #946c00; stroke-width: 2; rx: 16; ry: 16; }
      .box-sand { fill: #f7eadf; stroke: #8d6748; stroke-width: 2; rx: 16; ry: 16; }
      .title { font: 700 28px "Helvetica Neue", Arial, sans-serif; fill: #1f2a30; }
      .subtitle { font: 600 18px "Helvetica Neue", Arial, sans-serif; fill: #1f2a30; }
      .text { font: 500 16px "Helvetica Neue", Arial, sans-serif; fill: #24343b; }
      .small { font: 500 14px "Helvetica Neue", Arial, sans-serif; fill: #41565f; }
      .arrow { stroke: #31525b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 6; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760" />
  <text class="title" x="56" y="58">AGW UI Interaction Protocol Architecture</text>
  <text class="small" x="56" y="88">前端只对接 Gateway；Gateway 负责路由 Agent、资源访问与 SSE 事件回传。</text>

  <rect class="panel" x="40" y="120" width="1200" height="580" />

  <rect class="box-blue" x="80" y="190" width="220" height="120" />
  <text class="subtitle" x="110" y="230">Frontend App</text>
  <text class="text" x="110" y="262">发起 /api 请求</text>
  <text class="text" x="110" y="288">订阅 SSE</text>

  <rect class="box-green" x="400" y="170" width="280" height="160" />
  <text class="subtitle" x="435" y="210">Gateway API</text>
  <text class="text" x="435" y="242">/api/query / upload / submit</text>
  <text class="text" x="435" y="268">/steer / interrupt / viewport</text>
  <text class="text" x="435" y="294">/resource / agents / chat...</text>

  <rect class="box-gold" x="770" y="165" width="220" height="110" />
  <text class="subtitle" x="802" y="205">Agent Router</text>
  <text class="text" x="802" y="236">agentKey / policy</text>

  <rect class="box-gold" x="770" y="325" width="170" height="110" />
  <text class="subtitle" x="812" y="365">Agent A</text>
  <text class="text" x="802" y="396">research / code / qa</text>

  <rect class="box-gold" x="975" y="325" width="170" height="110" />
  <text class="subtitle" x="1018" y="365">Agent B</text>
  <text class="text" x="1006" y="396">planner / writer</text>

  <rect class="box-sand" x="380" y="470" width="280" height="120" />
  <text class="subtitle" x="420" y="510">Viewport Renderer</text>
  <text class="text" x="420" y="542">viewportKey -&gt; UI / HTML / Form</text>

  <rect class="box-sand" x="760" y="490" width="300" height="120" />
  <text class="subtitle" x="805" y="530">Resource Store</text>
  <text class="text" x="805" y="562">uploads / images / artifacts / files</text>

  <path class="arrow" d="M300 250 H390" />
  <text class="small" x="316" y="238">HTTP Request</text>

  <path class="arrow" d="M390 286 H300" />
  <text class="small" x="310" y="306">SSE Event Stream</text>

  <path class="arrow" d="M680 225 H760" />
  <text class="small" x="695" y="214">Route</text>

  <path class="arrow" d="M880 275 V317" />
  <path class="arrow" d="M960 275 V317" />

  <path class="arrow dashed" d="M520 330 V462" />
  <text class="small" x="536" y="408">viewportKey</text>

  <path class="arrow dashed" d="M655 550 H752" />
  <text class="small" x="676" y="540">render / asset access</text>

  <path class="arrow dashed" d="M935 435 V482" />
  <text class="small" x="950" y="470">publish artifacts</text>

  <path class="arrow dashed" d="M955 490 C955 448 1100 438 1145 438" />
  <path class="arrow dashed" d="M1145 438 C1180 438 1190 250 680 250" />
  <text class="small" x="1090" y="418">resource URL</text>

  <rect x="92" y="632" width="1080" height="42" fill="#eef2f3" stroke="#b6c3c8" rx="12" ry="12" />
  <text class="small" x="120" y="658">关键边界：HTTP 层负责请求与同步确认；SSE 层负责执行过程与异步结果。interrupt 的流层结果表现为 run.cancel。</text>
</svg>
