<svg width="1280" height="760" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AGW Architecture</title>
  <desc id="desc">Frontend、Agent Platform、Agent Runtime、Viewport 与 Resource Store 的关系图。</desc>
  <defs>
    <marker id="arrowA" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#29434e" />
    </marker>
    <style>
      .bg { fill: #fbfaf7; }
      .node { stroke-width: 2; rx: 16; ry: 16; }
      .front { fill: #d9eefb; stroke: #19607e; }
      .platform { fill: #e8f4e8; stroke: #2e7d32; }
      .runtime { fill: #fff3d6; stroke: #a36f00; }
      .side { fill: #f4e6dc; stroke: #8f5f3d; }
      .title { font: 700 28px "Helvetica Neue", Arial, sans-serif; fill: #1f2a30; }
      .subtitle { font: 600 18px "Helvetica Neue", Arial, sans-serif; fill: #1f2a30; }
      .text { font: 500 15px "Helvetica Neue", Arial, sans-serif; fill: #24343b; }
      .small { font: 500 13px "Helvetica Neue", Arial, sans-serif; fill: #485e67; }
      .arrow { stroke: #29434e; stroke-width: 3; fill: none; marker-end: url(#arrowA); }
      .panel { fill: #ffffff; stroke: #c7d3d8; stroke-width: 1.5; rx: 16; ry: 16; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1280" height="760" />
  <text class="title" x="48" y="58">AGW Architecture</text>
  <text class="small" x="48" y="88">协议默认主体是 Frontend 与 Agent Platform；Gateway 只是兼容部署模式之一，不是协议必须角色。</text>
  <rect class="node front" x="70" y="180" width="220" height="110" />
  <text class="subtitle" x="108" y="220">Frontend App</text>
  <text class="small" x="96" y="248">发起 /api 请求</text>
  <text class="small" x="96" y="270">订阅 live SSE</text>
  <rect class="node platform" x="420" y="160" width="300" height="150" />
  <text class="subtitle" x="470" y="214">Agent Platform</text>
  <text class="small" x="456" y="242">统一公开 /api/*</text>
  <text class="small" x="456" y="264">编排运行与状态</text>
  <text class="small" x="456" y="286">把 live 事件回传前端</text>
  <rect class="node runtime" x="860" y="170" width="260" height="130" />
  <text class="subtitle" x="916" y="214">Run-Agent</text>
  <text class="small" x="900" y="242">推理 / 工具 / 动作</text>
  <text class="small" x="900" y="264">生成 content / tool / task</text>
  <path class="arrow" d="M290 235 H412" />
  <path class="arrow" d="M720 235 H852" />
  <path class="arrow" d="M852 272 H720" />
  <path class="arrow" d="M412 272 H290" />
  <rect class="node side" x="150" y="430" width="250" height="120" />
  <text class="subtitle" x="200" y="470">Viewport</text>
  <text class="small" x="178" y="498">GET /api/viewport</text>
  <text class="small" x="178" y="520">获取表单或视图载荷</text>
  <rect class="node side" x="520" y="430" width="250" height="120" />
  <text class="subtitle" x="560" y="470">Resource Store</text>
  <text class="small" x="548" y="498">upload / resource / artifact</text>
  <text class="small" x="548" y="520">文件、图片、产物下载</text>
  <path class="arrow" d="M280 430 C330 370, 430 330, 520 310" />
  <path class="arrow" d="M645 430 V320" />
  <rect class="panel" x="70" y="620" width="1140" height="90" />
  <text class="subtitle" x="96" y="650">边界提示</text>
  <text class="small" x="96" y="676">- 协议层只要求前端与智能体平台通信；Gateway 只是平台的一种部署形态。</text>
  <text class="small" x="96" y="698">- submit / steer / interrupt 都是在同一份 live 协议上增加控制动作，而不是另起一套私有协议。</text>
</svg>
