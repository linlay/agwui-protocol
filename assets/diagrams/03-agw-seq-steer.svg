<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 870" width="100%" height="100%" style="background-color: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow-request" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#5A86C8"/></marker>
    <marker id="arrow-chat" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#6B92BF"/></marker>
    <marker id="arrow-run" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#4476AD"/></marker>
    <marker id="arrow-content" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#7AB9A8"/></marker>
    <style>
      .lifeline { stroke: #E5E7EB; stroke-width: 2; stroke-dasharray: 4 4; }
      .entity { fill: #FFFFFF; stroke: #374151; stroke-width: 2; rx: 6; }
      .entity-text { fill: #374151; font-size: 14px; font-weight: 700; text-anchor: middle; }
      .label { font-size: 13px; font-weight: 700; text-anchor: middle; }
      .code { fill: #6B7280; font-size: 12px; font-family: monospace; text-anchor: middle; }
      .req { stroke: #5A86C8; fill: none; stroke-width: 2; }
      .chat { stroke: #6B92BF; fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
      .run { stroke: #4476AD; fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
      .content { stroke: #7AB9A8; fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
      .label-req { fill: #5A86C8; }
      .label-chat { fill: #6B92BF; }
      .label-run { fill: #4476AD; }
      .label-content { fill: #7AB9A8; }
    </style>
  </defs>

  <line class="lifeline" x1="100" y1="80" x2="100" y2="830" />
  <line class="lifeline" x1="1100" y1="80" x2="1100" y2="830" />

  <rect class="entity" x="20" y="40" width="160" height="40" />
  <text class="entity-text" x="100" y="65">Frontend</text>
  <rect class="entity" x="1020" y="40" width="160" height="40" />
  <text class="entity-text" x="1100" y="65">Agent Platform</text>

  <g opacity="0"><animate attributeName="opacity" begin="0s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="content" d="M1100 160 L100 160" marker-end="url(#arrow-content)"/>
    <text class="label label-content" x="600" y="152">[SSE] content.start (运行中的正文段已经开始)</text>
    <text class="code" x="600" y="176">data: {"type":"content.start","contentId":"mnzmv24k_r_1","runId":"mnzmv24k"}</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" begin="0.7s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="content" d="M1100 220 L100 220" marker-end="url(#arrow-content)"/>
    <text class="label label-content" x="600" y="212">[SSE] content.delta (先输出一段已有正文)</text>
    <text class="code" x="600" y="236">data: {"type":"content.delta","contentId":"mnzmv24k_r_1","delta":"我先概括公开 HTTP API 与 live SSE 的边界。"}</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" begin="1.4s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="req" d="M100 280 L1100 280" marker-end="url(#arrow-request)"/>
    <text class="label label-req" x="600" y="272">POST /api/steer</text>
    <text class="code" x="600" y="296">{"runId":"mnzmv24k","steerId":"steer_001","message":"补充一个要求：先列出关键事件，再继续总结。"}</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" begin="2.1s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="req" d="M1100 340 L100 340" marker-end="url(#arrow-request)"/>
    <text class="label label-req" x="600" y="332">HTTP ack (控制请求成功接收)</text>
    <text class="code" x="600" y="356">{"accepted":true,"status":"accepted","runId":"mnzmv24k","steerId":"steer_001"}</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" begin="2.8s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="content" d="M1100 400 L100 400" marker-end="url(#arrow-content)"/>
    <text class="label label-content" x="600" y="392">[SSE] content.end (当前正文先收尾)</text>
    <text class="code" x="600" y="416">data: {"type":"content.end","contentId":"mnzmv24k_r_1"}</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" begin="3.5s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="req" d="M1100 460 L100 460" marker-end="url(#arrow-request)" stroke-dasharray="6 4"/>
    <text class="label label-req" x="600" y="452">[SSE] request.steer (追加指令插回原始事件流)</text>
    <text class="code" x="600" y="476">data: {"type":"request.steer","runId":"mnzmv24k","steerId":"steer_001","message":"补充一个要求：先列出关键事件，再继续总结。","role":"user"}</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" begin="4.2s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="content" d="M1100 520 L100 520" marker-end="url(#arrow-content)"/>
    <text class="label label-content" x="600" y="512">[SSE] content.start (steer 后重新开始一段正文)</text>
    <text class="code" x="600" y="536">data: {"type":"content.start","contentId":"mnzmv24k_r_2","runId":"mnzmv24k"}</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" begin="4.9s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="content" d="M1100 580 L100 580" marker-end="url(#arrow-content)"/>
    <text class="label label-content" x="600" y="572">[SSE] content.delta (新正文按追加要求继续输出)</text>
    <text class="code" x="600" y="596">data: {"type":"content.delta","contentId":"mnzmv24k_r_2","delta":"关键事件包括 content.start、content.delta、content.end、request.steer、run.complete。"}</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" begin="5.6s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="content" d="M1100 640 L100 640" marker-end="url(#arrow-content)"/>
    <text class="label label-content" x="600" y="632">[SSE] content.end (steer 后的新正文结束)</text>
    <text class="code" x="600" y="656">data: {"type":"content.end","contentId":"mnzmv24k_r_2"}</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" begin="6.3s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="run" d="M1100 700 L100 700" marker-end="url(#arrow-run)"/>
    <text class="label label-run" x="600" y="692">[SSE] run.complete (同一条流上的本次运行完成)</text>
    <text class="code" x="600" y="716">data: {"type":"run.complete","runId":"mnzmv24k","finishReason":"stop"}</text>
  </g>
</svg>
