<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1320" width="100%" height="100%" style="background-color: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow-request" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#5A86C8"/></marker>
    <marker id="arrow-chat" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#6B92BF"/></marker>
    <marker id="arrow-run" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#4476AD"/></marker>
    <marker id="arrow-content" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#7AB9A8"/></marker>
    <style>
      .lifeline { stroke: #E5E7EB; stroke-width: 2; stroke-dasharray: 4 4; }
      .entity { fill: #FFFFFF; stroke: #374151; stroke-width: 2; rx: 6; }
      .entity-text { fill: #374151; font-size: 14px; font-weight: 700; text-anchor: middle; }
      .stage { fill: #8A8175; font-size: 12px; font-weight: 700; text-anchor: middle; letter-spacing: 1px; }
      .label { font-size: 13px; font-weight: 700; text-anchor: middle; }
      .code { fill: #6B7280; font-size: 12px; font-family: monospace; text-anchor: middle; }
      .req { stroke: #5A86C8; fill: none; stroke-width: 2; }
      .chat { stroke: #6B92BF; fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
      .run { stroke: #4476AD; fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
      .content { stroke: #7AB9A8; fill: none; stroke-width: 2; stroke-dasharray: 6 4; }
      .label-req { fill: #5A86C8; }
      .label-chat { fill: #6B92BF; }
      .label-run { fill: #4476AD; }
      .label-content { fill: #7AB9A8; }
    </style>
  </defs>

  <line class="lifeline" x1="100" y1="80" x2="100" y2="1280" />
  <line class="lifeline" x1="1100" y1="80" x2="1100" y2="1280" />

  <rect class="entity" x="20" y="40" width="160" height="40" />
  <text class="entity-text" x="100" y="65">Frontend</text>
  <rect class="entity" x="1020" y="40" width="160" height="40" />
  <text class="entity-text" x="1100" y="65">Agent Platform</text>

  <text class="stage" x="600" y="110">TURN 1</text>

  <g opacity="0"><animate attributeName="opacity" begin="0s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="req" d="M100 160 L1100 160" marker-end="url(#arrow-request)"/>
    <text class="label label-req" x="600" y="152">POST /api/query</text>
    <text class="code" x="600" y="176">{"agentKey":"ak","message":"先给我一版三点总结"}</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" begin="0.8s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="req" d="M1100 250 L100 250" marker-end="url(#arrow-request)"/>
    <text class="label label-req" x="600" y="242">HTTP 200 OK</text>
    <text class="code" x="600" y="266">Content-Type: text/event-stream</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" begin="1.6s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="chat" d="M1100 340 L100 340" marker-end="url(#arrow-chat)"/>
    <text class="label label-chat" x="600" y="332">[SSE] chat.start (新会话开始，chatId 是 uuid)</text>
    <text class="code" x="600" y="356">data: {"type":"chat.start","chatId":"chat_live_001","chatName":"AGW Doc Draft"}</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" begin="2.4s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="run" d="M1100 430 L100 430" marker-end="url(#arrow-run)"/>
    <text class="label label-run" x="600" y="422">[SSE] run.start (运行开始，runId 是新的执行标识)</text>
    <text class="code" x="600" y="446">data: {"type":"run.start","runId":"mnzmv24k","chatId":"chat_live_001","agentKey":"ak"}</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" begin="3.2s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="content" d="M1100 520 L100 520" marker-end="url(#arrow-content)"/>
    <text class="label label-content" x="600" y="512">[SSE] content.start (正文开始，contentId 是由 runId 组合出来)</text>
    <text class="code" x="600" y="536">data: {"type":"content.start","contentId":"mnzmv24k_r_1","runId":"mnzmv24k"}</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" begin="4.0s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="content" d="M1100 610 L100 610" marker-end="url(#arrow-content)"/>
    <text class="label label-content" x="600" y="602">[SSE] content.delta (先输出一部分正文)</text>
    <text class="code" x="600" y="626">data: {"type":"content.delta","contentId":"mnzmv24k_r_1","delta":"我先概括公开 HTTP API 与 live SSE 的边界。"}</text>
  </g>

  <text class="stage" x="600" y="710" opacity="0"><animate attributeName="opacity" begin="4.8s" dur="0.25s" from="0" to="1" fill="freeze"/>TURN 2</text>

  <g opacity="0"><animate attributeName="opacity" begin="5.0s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="req" d="M100 780 L1100 780" marker-end="url(#arrow-request)"/>
    <text class="label label-req" x="600" y="772">POST /api/steer</text>
    <text class="code" x="600" y="796">{"runId":"mnzmv24k","steerId":"steer_001","message":"补充一个要求：先列出关键事件，再继续总结。"}</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" begin="5.8s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="req" d="M1100 870 L100 870" marker-end="url(#arrow-request)"/>
    <text class="label label-req" x="600" y="862">HTTP ack (控制请求成功接收)</text>
    <text class="code" x="600" y="886">{"accepted":true,"status":"accepted","runId":"mnzmv24k","steerId":"steer_001"}</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" begin="6.6s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="req" d="M1100 960 L100 960" marker-end="url(#arrow-request)" stroke-dasharray="6 4"/>
    <text class="label label-req" x="600" y="952">[SSE] request.steer (追加指令进入原始事件流)</text>
    <text class="code" x="600" y="976">data: {"type":"request.steer","runId":"mnzmv24k","steerId":"steer_001","message":"补充一个要求：先列出关键事件，再继续总结。","role":"user"}</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" begin="7.4s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="content" d="M1100 1050 L100 1050" marker-end="url(#arrow-content)"/>
    <text class="label label-content" x="600" y="1042">[SSE] content.delta (原流继续输出)</text>
    <text class="code" x="600" y="1066">data: {"type":"content.delta","contentId":"mnzmv24k_r_1","delta":"关键事件包括 chat.start、run.start、content.start、content.delta、content.end、run.complete。"}</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" begin="8.2s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="content" d="M1100 1140 L100 1140" marker-end="url(#arrow-content)"/>
    <text class="label label-content" x="600" y="1132">[SSE] content.end (正文结束)</text>
    <text class="code" x="600" y="1156">data: {"type":"content.end","contentId":"mnzmv24k_r_1"}</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" begin="9.0s" dur="0.25s" from="0" to="1" fill="freeze"/>
    <path class="run" d="M1100 1230 L100 1230" marker-end="url(#arrow-run)"/>
    <text class="label label-run" x="600" y="1222">[SSE] run.complete (运行完成)</text>
    <text class="code" x="600" y="1246">data: {"type":"run.complete","runId":"mnzmv24k","finishReason":"stop"}</text>
  </g>
</svg>
