<svg width="1360" height="778" viewBox="0 0 1360 778" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">04 AGW Artifact Sequence</title>
  <desc id="desc">一次工具结果后，live SSE 可以连续发布多条 artifact.publish。</desc>

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L10,5 L0,10 z" fill="#29434e" />
  </marker>
  <style>
    .bg { fill: #fbfaf7; }
    .lane { stroke: #93a6ad; stroke-width: 2; }
    .node { stroke-width: 2; rx: 14; ry: 14; }
    .front { fill: #d9eefb; stroke: #19607e; }
    .platform { fill: #e8f4e8; stroke: #2e7d32; }
    .run { fill: #fff3d6; stroke: #a36f00; }
    .note { fill: #f4e6dc; stroke: #8f5f3d; }
    .accent { fill: #ede7fb; stroke: #6a4fb3; }
    .title { font: 700 28px "Helvetica Neue", Arial, sans-serif; fill: #1f2a30; }
    .subtitle { font: 600 18px "Helvetica Neue", Arial, sans-serif; fill: #1f2a30; }
    .text { font: 500 15px "Helvetica Neue", Arial, sans-serif; fill: #24343b; }
    .small { font: 500 13px "Helvetica Neue", Arial, sans-serif; fill: #485e67; }
    .tiny { font: 500 12px "Helvetica Neue", Arial, sans-serif; fill: #566c74; }
    .arrow { stroke: #29434e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .dashed { stroke-dasharray: 8 6; }
    .panel { fill: #ffffff; stroke: #c7d3d8; stroke-width: 1.5; rx: 16; ry: 16; }
  </style>
</defs>
  <rect class="bg" x="0" y="0" width="1360" height="778" />
  <text class="title" x="52" y="58">04 AGW Artifact Sequence</text>
  <text class="small" x="52" y="88">artifact.publish 是 tool.result 之后的附加流事件；一次工具调用可以对应多个产物。</text>
  <text class="subtitle" x="98" y="145">Frontend</text>
  <text class="subtitle" x="432" y="145">Agent Platform</text>
  <text class="subtitle" x="848" y="145">Run-Agent</text>
  <line class="lane" x1="170" y1="170" x2="170" y2="590" />
  <line class="lane" x1="540" y1="170" x2="540" y2="590" />
  <line class="lane" x1="960" y1="170" x2="960" y2="590" />
  <rect class="node front" x="48" y="188" width="244" height="52" />
  <text class="text" x="82" y="220">POST /api/query</text>
  <path class="arrow" d="M292 214 H406" />
  <rect class="node run" x="824" y="188" width="272" height="52" />
  <text class="text" x="854" y="220">tool.start</text>
  <path class="arrow dashed" d="M824 214 H548" />
  <path class="arrow dashed" d="M540 214 H178" />
  <rect class="node run" x="824" y="260" width="272" height="52" />
  <text class="text" x="854" y="292">tool.args</text>
  <path class="arrow dashed" d="M824 286 H548" />
  <path class="arrow dashed" d="M540 286 H178" />
  <rect class="node run" x="824" y="332" width="272" height="52" />
  <text class="text" x="854" y="364">tool.end</text>
  <path class="arrow dashed" d="M824 358 H548" />
  <path class="arrow dashed" d="M540 358 H178" />
  <rect class="node run" x="824" y="404" width="272" height="52" />
  <text class="text" x="854" y="436">tool.result</text>
  <path class="arrow dashed" d="M824 430 H548" />
  <path class="arrow dashed" d="M540 430 H178" />
  <rect class="node accent" x="796" y="490" width="328" height="72" />
  <text class="text" x="824" y="520">artifact.publish x N</text>
  <text class="small" x="824" y="544">每条都带 artifactId / chatId / runId / artifact</text>
  <path class="arrow dashed" d="M796 526 H548" />
  <path class="arrow dashed" d="M540 526 H178" />
  <rect class="panel" x="56" y="640" width="1248" height="118" />
  <text class="subtitle" x="80" y="670">图上要点</text>
  <text class="small" x="80" y="698">- artifact.publish 不替代 tool.result，而是跟在其后的附加 live 事件。</text>
  <text class="small" x="80" y="720">- 一次工具调用可对应多条 artifact.publish。</text>
  <text class="small" x="80" y="742">- 图中仍只画前端可见的 live 协议，不画 artifact 聚合态快照。</text>
</svg>
