<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1220" width="100%" height="100%" style="background-color: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <defs>
        <!-- Arrow markers for different event types -->
        <marker id="arrow-req" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A86C8" />
        </marker>
        <marker id="arrow-chat" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B92BF" />
        </marker>
        <marker id="arrow-run" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#4476AD" />
        </marker>
        <marker id="arrow-content" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#7AB9A8" />
        </marker>

        <!-- Animation ClipPaths for TURN 1 -->
        <clipPath id="cp-t1-1">
            <rect x="100" y="140" width="1000" height="40">
                <animate attributeName="width" from="0" to="1000" begin="0s" dur="0.3s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="cp-t1-2">
            <rect x="100" y="230" width="1000" height="40">
                <animate attributeName="width" from="0" to="0" begin="0s" dur="0.8s" fill="freeze" />
                <animate attributeName="x" from="1100" to="1100" begin="0s" dur="0.8s" fill="freeze" />
                <animate attributeName="width" from="0" to="1000" begin="0.8s" dur="0.3s" fill="freeze" />
                <animate attributeName="x" from="1100" to="100" begin="0.8s" dur="0.3s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="cp-t1-3">
            <rect x="100" y="320" width="1000" height="40">
                <animate attributeName="width" from="0" to="0" begin="0s" dur="1.6s" fill="freeze" />
                <animate attributeName="x" from="1100" to="1100" begin="0s" dur="1.6s" fill="freeze" />
                <animate attributeName="width" from="0" to="1000" begin="1.6s" dur="0.3s" fill="freeze" />
                <animate attributeName="x" from="1100" to="100" begin="1.6s" dur="0.3s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="cp-t1-4">
            <rect x="100" y="410" width="1000" height="40">
                <animate attributeName="width" from="0" to="0" begin="0s" dur="2.4s" fill="freeze" />
                <animate attributeName="x" from="1100" to="1100" begin="0s" dur="2.4s" fill="freeze" />
                <animate attributeName="width" from="0" to="1000" begin="2.4s" dur="0.3s" fill="freeze" />
                <animate attributeName="x" from="1100" to="100" begin="2.4s" dur="0.3s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="cp-t1-5">
            <rect x="100" y="500" width="1000" height="40">
                <animate attributeName="width" from="0" to="0" begin="0s" dur="3.2s" fill="freeze" />
                <animate attributeName="x" from="1100" to="1100" begin="0s" dur="3.2s" fill="freeze" />
                <animate attributeName="width" from="0" to="1000" begin="3.2s" dur="0.3s" fill="freeze" />
                <animate attributeName="x" from="1100" to="100" begin="3.2s" dur="0.3s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="cp-t1-6">
            <rect x="100" y="590" width="1000" height="40">
                <animate attributeName="width" from="0" to="0" begin="0s" dur="4.0s" fill="freeze" />
                <animate attributeName="x" from="1100" to="1100" begin="0s" dur="4.0s" fill="freeze" />
                <animate attributeName="width" from="0" to="1000" begin="4.0s" dur="0.3s" fill="freeze" />
                <animate attributeName="x" from="1100" to="100" begin="4.0s" dur="0.3s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="cp-t1-7">
            <rect x="100" y="680" width="1000" height="40">
                <animate attributeName="width" from="0" to="0" begin="0s" dur="4.8s" fill="freeze" />
                <animate attributeName="x" from="1100" to="1100" begin="0s" dur="4.8s" fill="freeze" />
                <animate attributeName="width" from="0" to="1000" begin="4.8s" dur="0.3s" fill="freeze" />
                <animate attributeName="x" from="1100" to="100" begin="4.8s" dur="0.3s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="cp-t1-8">
            <rect x="100" y="770" width="1000" height="40">
                <animate attributeName="width" from="0" to="0" begin="0s" dur="5.6s" fill="freeze" />
                <animate attributeName="x" from="1100" to="1100" begin="0s" dur="5.6s" fill="freeze" />
                <animate attributeName="width" from="0" to="1000" begin="5.6s" dur="0.3s" fill="freeze" />
                <animate attributeName="x" from="1100" to="100" begin="5.6s" dur="0.3s" fill="freeze" />
            </rect>
        </clipPath>

        <!-- Animation ClipPaths for TURN 2 -->
        <clipPath id="cp-t2-1">
            <rect x="100" y="910" width="1000" height="40">
                <animate attributeName="width" from="0" to="0" begin="0s" dur="6.8s" fill="freeze" />
                <animate attributeName="width" from="0" to="1000" begin="6.8s" dur="0.3s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="cp-t2-2">
            <rect x="100" y="1000" width="1000" height="40">
                <animate attributeName="width" from="0" to="0" begin="0s" dur="7.6s" fill="freeze" />
                <animate attributeName="x" from="1100" to="1100" begin="0s" dur="7.6s" fill="freeze" />
                <animate attributeName="width" from="0" to="1000" begin="7.6s" dur="0.3s" fill="freeze" />
                <animate attributeName="x" from="1100" to="100" begin="7.6s" dur="0.3s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="cp-t2-3">
            <rect x="100" y="1090" width="1000" height="40">
                <animate attributeName="width" from="0" to="0" begin="0s" dur="8.4s" fill="freeze" />
                <animate attributeName="x" from="1100" to="1100" begin="0s" dur="8.4s" fill="freeze" />
                <animate attributeName="width" from="0" to="1000" begin="8.4s" dur="0.3s" fill="freeze" />
                <animate attributeName="x" from="1100" to="100" begin="8.4s" dur="0.3s" fill="freeze" />
            </rect>
        </clipPath>
    </defs>

    <!-- Vertical Lifelines -->
    <line x1="100" y1="80" x2="100" y2="1180" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="4 4" />
    <line x1="1100" y1="80" x2="1100" y2="1180" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="4 4" />

    <!-- Top Entities (Dark Gray / Blackish) -->
    <rect x="20" y="40" width="160" height="40" rx="6" fill="#FFFFFF" stroke="#374151" stroke-width="2"/>
    <text x="100" y="65" fill="#374151" font-size="14" font-weight="bold" text-anchor="middle">Frontend</text>

    <rect x="1020" y="40" width="160" height="40" rx="6" fill="#FFFFFF" stroke="#374151" stroke-width="2"/>
    <text x="1100" y="65" fill="#374151" font-size="14" font-weight="bold" text-anchor="middle">Agent Platform</text>

    <!-- TURN 1 Label -->
    <text x="600" y="110" fill="#9CA3AF" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="1">TURN 1</text>

    <!-- Event 1 -->
    <g>
        <path d="M 100 160 L 1100 160" stroke="#5A86C8" stroke-width="2" fill="none" marker-end="url(#arrow-req)" clip-path="url(#cp-t1-1)" />
        <text x="600" y="152" fill="#5A86C8" font-size="13" font-weight="bold" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="0.3s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.2s" fill="freeze" />
            POST /api/query
        </text>
        <text x="600" y="176" fill="#6B7280" font-size="12" font-family="monospace" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="0.5s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.2s" fill="freeze" />
            {"agentKey":"ak","message":"用一句话解释 AGW 事件流"}
        </text>
    </g>

    <!-- Event 2 -->
    <g>
        <path d="M 1100 250 L 100 250" stroke="#5A86C8" stroke-width="2" fill="none" marker-end="url(#arrow-req)" clip-path="url(#cp-t1-2)" />
        <text x="600" y="242" fill="#5A86C8" font-size="13" font-weight="bold" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="1.1s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.2s" fill="freeze" />
            HTTP 200 OK
        </text>
        <text x="600" y="266" fill="#6B7280" font-size="12" font-family="monospace" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="1.3s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="1.3s" dur="0.2s" fill="freeze" />
            Content-Type: text/event-stream
        </text>
    </g>

    <!-- Event 3 -->
    <g>
        <path d="M 1100 340 L 100 340" stroke="#6B92BF" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow-chat)" clip-path="url(#cp-t1-3)" />
        <text x="600" y="332" fill="#6B92BF" font-size="13" font-weight="bold" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="1.9s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.2s" fill="freeze" />
            [SSE] chat.start (新会话开始，chatId 是 uuid)
        </text>
        <text x="600" y="356" fill="#6B7280" font-size="12" font-family="monospace" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="2.1s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="2.1s" dur="0.2s" fill="freeze" />
            data: {"type":"chat.start","chatId":"7b09c3b3-8e6a-4df2-a7c4-3a6c2a1dc2c1","chatName":"Minimal QA"}
        </text>
    </g>

    <!-- Event 4 -->
    <g>
        <path d="M 1100 430 L 100 430" stroke="#4476AD" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow-run)" clip-path="url(#cp-t1-4)" />
        <text x="600" y="422" fill="#4476AD" font-size="13" font-weight="bold" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="2.7s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="2.7s" dur="0.2s" fill="freeze" />
            [SSE] run.start (运行开始，runId 是带时间顺序的)
        </text>
        <text x="600" y="446" fill="#6B7280" font-size="12" font-family="monospace" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="2.9s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="2.9s" dur="0.2s" fill="freeze" />
            data: {"type":"run.start","runId":"mnzmv00n","chatId":"7b09c3b3-8e6a-4df2-a7c4-3a6c2a1dc2c1","agentKey":"ak"}
        </text>
    </g>

    <!-- Event 5 -->
    <g>
        <path d="M 1100 520 L 100 520" stroke="#7AB9A8" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow-content)" clip-path="url(#cp-t1-5)" />
        <text x="600" y="512" fill="#7AB9A8" font-size="13" font-weight="bold" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="3.5s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.2s" fill="freeze" />
            [SSE] content.start (正文开始，contentId 是由 runId 组合出来)
        </text>
        <text x="600" y="536" fill="#6B7280" font-size="12" font-family="monospace" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="3.7s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="3.7s" dur="0.2s" fill="freeze" />
            data: {"type":"content.start","contentId":"mnzmv00n_r_1","runId":"mnzmv00n"}
        </text>
    </g>

    <!-- Event 6 -->
    <g>
        <path d="M 1100 610 L 100 610" stroke="#7AB9A8" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow-content)" clip-path="url(#cp-t1-6)" />
        <text x="600" y="602" fill="#7AB9A8" font-size="13" font-weight="bold" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="4.3s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="4.3s" dur="0.2s" fill="freeze" />
            [SSE] content.delta x N (多个正文变化)
        </text>
        <text x="600" y="626" fill="#6B7280" font-size="12" font-family="monospace" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="4.5s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.2s" fill="freeze" />
            data: {"type":"content.delta","contentId":"mnzmv00n_r_1","delta":"AGW 把 HTTP 请求与 live SSE 事件流分开建模。"}
        </text>
    </g>

    <!-- Event 7 -->
    <g>
        <path d="M 1100 700 L 100 700" stroke="#7AB9A8" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow-content)" clip-path="url(#cp-t1-7)" />
        <text x="600" y="692" fill="#7AB9A8" font-size="13" font-weight="bold" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="5.1s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="5.1s" dur="0.2s" fill="freeze" />
            [SSE] content.end (正文结束)
        </text>
        <text x="600" y="716" fill="#6B7280" font-size="12" font-family="monospace" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="5.3s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="5.3s" dur="0.2s" fill="freeze" />
            data: {"type":"content.end","contentId":"mnzmv00n_r_1"}
        </text>
    </g>

    <!-- Event 8 -->
    <g>
        <path d="M 1100 790 L 100 790" stroke="#4476AD" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow-run)" clip-path="url(#cp-t1-8)" />
        <text x="600" y="782" fill="#4476AD" font-size="13" font-weight="bold" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="5.9s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="5.9s" dur="0.2s" fill="freeze" />
            [SSE] run.complete (运行完成)
        </text>
        <text x="600" y="806" fill="#6B7280" font-size="12" font-family="monospace" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="6.1s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="6.1s" dur="0.2s" fill="freeze" />
            data: {"type":"run.complete","runId":"mnzmv00n","finishReason":"stop"}
        </text>
    </g>

    <!-- TURN 2 Label -->
    <text x="600" y="880" fill="#9CA3AF" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="1" opacity="1">
        <animate attributeName="opacity" from="0" to="0" begin="0s" dur="6.4s" fill="freeze" />
        <animate attributeName="opacity" from="0" to="1" begin="6.4s" dur="0.2s" fill="freeze" />
        TURN 2
    </text>

    <!-- Event 9 -->
    <g>
        <path d="M 100 930 L 1100 930" stroke="#5A86C8" stroke-width="2" fill="none" marker-end="url(#arrow-req)" clip-path="url(#cp-t2-1)" />
        <text x="600" y="922" fill="#5A86C8" font-size="13" font-weight="bold" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="7.1s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="7.1s" dur="0.2s" fill="freeze" />
            POST /api/query
        </text>
        <text x="600" y="946" fill="#6B7280" font-size="12" font-family="monospace" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="7.3s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="7.3s" dur="0.2s" fill="freeze" />
            {"chatId":"7b09c3b3-8e6a-4df2-a7c4-3a6c2a1dc2c1","agentKey":"ak","message":"继续，总结三点"}
        </text>
    </g>

    <!-- Event 10 -->
    <g>
        <path d="M 1100 1020 L 100 1020" stroke="#5A86C8" stroke-width="2" fill="none" marker-end="url(#arrow-req)" clip-path="url(#cp-t2-2)" />
        <text x="600" y="1012" fill="#5A86C8" font-size="13" font-weight="bold" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="7.9s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="7.9s" dur="0.2s" fill="freeze" />
            HTTP 200 OK
        </text>
        <text x="600" y="1036" fill="#6B7280" font-size="12" font-family="monospace" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="8.1s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="8.1s" dur="0.2s" fill="freeze" />
            Content-Type: text/event-stream
        </text>
    </g>

    <!-- Event 11 -->
    <g>
        <path d="M 1100 1110 L 100 1110" stroke="#4476AD" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow-run)" clip-path="url(#cp-t2-3)" />
        <text x="600" y="1102" fill="#4476AD" font-size="13" font-weight="bold" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="8.7s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="8.7s" dur="0.2s" fill="freeze" />
            [SSE] run.start (运行开始，复用同一个 chatId，但 runId 全新)
        </text>
        <text x="600" y="1126" fill="#6B7280" font-size="12" font-family="monospace" text-anchor="middle" opacity="1">
            <animate attributeName="opacity" from="0" to="0" begin="0s" dur="8.9s" fill="freeze" />
            <animate attributeName="opacity" from="0" to="1" begin="8.9s" dur="0.2s" fill="freeze" />
            data: {"type":"run.start","runId":"mnzmv12h","chatId":"7b09c3b3-8e6a-4df2-a7c4-3a6c2a1dc2c1","agentKey":"ak"}
        </text>
    </g>
</svg>
